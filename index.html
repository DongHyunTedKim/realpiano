<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0e0e1a" />
  <title>RealPiano · 피아노 코드 시각화</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <!-- ── 헤더 ─────────────────────────────────────────── -->
    <header class="header">
      <div class="brand">
        <span class="brand__dot" aria-hidden="true">🎹</span>
        <div>
          <h1 class="brand__title">RealPiano</h1>
        </div>
      </div>

      <button id="langToggle" class="lang-toggle" type="button" aria-label="음이름 표기 전환">
        <span class="lang-toggle__opt is-active" data-lang="en">ABC</span>
        <span class="lang-toggle__opt" data-lang="ko">도레미</span>
      </button>
    </header>

    <!-- ── 무대: 코드 디스플레이 + 건반 ───────────────────── -->
    <section class="stage">
      <div class="readout">
        <div class="readout__name">
          <span id="chordName" class="readout__chord">코드를 선택하세요</span>
          <span id="chordType" class="readout__typename"></span>
        </div>
        <div id="chordNotes" class="readout__notes" aria-live="polite"></div>
        <button id="playBtn" class="play-btn" type="button" disabled>
          ▶ 다시 듣기
        </button>
      </div>

      <div class="piano-wrap">
        <div id="piano" class="piano" role="group" aria-label="피아노 건반"></div>
      </div>
    </section>

    <!-- ── 컨트롤: 검색 + 브라우징 ────────────────────────── -->
    <section class="controls">
      <div class="search">
        <span class="search__icon" aria-hidden="true">🔍</span>
        <input
          id="search"
          class="search__input"
          type="text"
          inputmode="text"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder="코드 입력 — 예: Caug, Dm7, G#7, Bbmaj7" />
        <button id="searchClear" class="search__clear" type="button" aria-label="지우기" hidden>✕</button>
      </div>
      <p id="searchHint" class="search__hint"></p>

      <div id="typeTabs" class="tabs" role="tablist" aria-label="코드 타입"></div>
      <div id="rootGrid" class="root-grid" aria-label="루트음 목록"></div>
    </section>

    <footer class="footer">
      <span>Web Audio 합성음 · 100% 정적 · 오프라인 동작</span>
    </footer>
  </div>

  <script src="js/chords.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
