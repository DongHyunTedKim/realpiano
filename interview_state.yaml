  implementation_details:
    tech_stack: true
    out_of_scope: true
  constraints:
    schedule_budget: true
  success_criteria:
    criteria: true

decided_items:
  purpose: "피아노 독학자가 코드를 눈으로 보며 빠르게 익히도록 돕기 위한 피아노 코드 시각화 웹 서비스"
  target_users:
    - "피아노를 막 시작한 완전 초보자"
    - "스마트폰/아이패드를 보면대에 올려두고 피아노 옆에서 사용"
  core_features:
    - "텍스트로 코드 이름 검색 (예: Caug, Dm7, G7)"
    - "코드 목록 브라우징 (카테고리별)"
    - "해당 건반 하이라이트 + 반짝이는 애니메이션"
    - "코드 구성음의 역할 표시 (Root, 3rd, 5th 등)"
    - "코드 버튼 클릭 시 Web Audio API로 소리 재생"
    - "100개+ 코드 지원 (Major, minor, 7th, aug, dim 등)"
    - "한/영 음이름 전환 (C/도 전환)"
    - "모바일 반응형 디자인 (아이패드/아이폰 보면대 사용 최적화)"
  tech_stack:
    - "웹 서비스 (HTML/CSS/JavaScript 기반)"
    - "Web Audio API (코드 소리 재생)"
    - "반응형 CSS (모바일/태블릿 최적화)"
  out_of_scope:
    - "스케일(Scale) 시각화 - MVP 이후"
    - "즐겨찾기/히스토리 저장 - MVP 이후"
    - "코드 진행표 - MVP 이후"
    - "나만의 코드집 만들기 - MVP 이후"
    - "로그인/회원가입 - MVP 이후"
    - "MIDI 연동 - MVP 이후"
  constraints:
    - "개발 기간: 지금 당장 (즉시 개발 시작)"
    - "개발 인원: 1인 개발 + AI Agent Code Assistant"
    - "예산: 별도 없음 (개인 프로젝트)"
    - "플랫폼: 웹 서비스"
  success_criteria:
    - "코드 이름 입력 후 해당 건반이 반짝이면서 소리가 남"
    - "모바일(아이패드/아이폰)에서 오류 없이 정상 작동"
    - "비개발자에게 데모 시 직관적으로 사용 가능"

open_questions:
  - "피아노 건반 옥타브 범위: 1옥타브(13건반) vs 2옥타브(25건반) vs 전체"
  - "코드 인버전(Inversion) 지원 여부"
  - "배포 환경 (GitHub Pages, Vercel 등)"
